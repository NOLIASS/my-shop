<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
</head>
<body>
  <h1>{{ title }}</h1>
  <p>Ласкаво просимо до нашого магазину!</p>
  <nav>
    <ul>
      {% for page in pages %}
        <li><a href="{% url page.url %}">{{ page.name }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</body>
</html>
